# =====================================================================
# sim/legal/company.yaml — MANIFIESTO DE ONBOARD (bufete ficticio)
# Sandbox de prueba del genoma base. Mismo manifiesto -> mismo genoma.
# =====================================================================

company:
  name: "Vega & Alcántara Abogados"
  sector: "bufete legal — litigio civil y mercantil"
  language: es
  domains: ["vega-alcantara.legal"]

# Tipos de documento que maneja el negocio (guían la clasificación de INGEST)
document_types: [contrato, escrito-de-caso, jurisprudencia, dictamen, minuta-cliente]

# Entidades clave: cada clave es una categoría -> carpeta en wiki/semantic/
entities:
  clientes: ["Distribuidora Andina S.A."]
  casos: ["EXP-2026-0142"]
  contrapartes: ["Logística del Norte S.L."]
  juzgados: ["Juzgado de lo Mercantil nº 3 de Madrid"]
  abogados: ["Lucía Vega", "Mateo Alcántara"]

# Glosario / siglas internas (el agente las respeta al ingerir y consultar)
glossary:
  EXP: "número de expediente interno del caso"
  SP: "secreto profesional / información amparada por confidencialidad abogado-cliente"
  contraparte: "parte adversa en un litigio o negociación"
  dictamen: "opinión jurídica formal emitida por el bufete"
  cláusula-tipo: "cláusula contractual reutilizable de la biblioteca interna"

roles:
  contributors: ["socios", "asociados", "paralegales"]
  mutation_approver: "socio-director"

# Genes específicos del sector que ONBOARD siembra (pasan por la compuerta)
seed_genes:
  - id: gen-secreto-profesional
    trigger: "la fuente contiene info amparada por secreto profesional (minutas, estrategia, datos sensibles del cliente)"
    rule: "Marca la página con tag 'confidencial' y campo 'secreto_profesional: true'; NO la enlaces como conocimiento abierto desde index.md; restringe a wiki/semantic/clientes|casos/ del cliente y nunca cites su contenido textual en QUERY salvo petición autorizada."
    target_tier: semantic

  - id: gen-version-contrato
    trigger: "la fuente es una versión nueva de un contrato o cláusula ya existente"
    rule: "Crea página nueva de la versión y marca relation 'reemplaza' hacia la versión anterior, que pasa a confidence<=0.4 y tag 'historico'; nunca borres la versión vieja (queda como rastro de negociación)."
    target_tier: semantic

  - id: gen-conflicto-interes
    trigger: "se ingiere un cliente o caso nuevo"
    rule: "Cruza el nuevo cliente/contraparte contra entities.clientes y entities.contrapartes existentes; si una contraparte coincide con un cliente actual (o viceversa), marca relation 'contradice' + tag 'conflicto-interes' y eleva alerta en QUERY antes de aceptar el encargo."
    target_tier: semantic

# Taxonomía inicial de carpetas a crear por tier
taxonomy:
  semantic: [clientes, casos, contrapartes, contratos, jurisprudencia, normativa, dictamenes]
  procedural: [sops-litigio, plantillas-clausulas]
