# =====================================================================
# sim/agencia/company.yaml — MANIFIESTO DE ONBOARD (sandbox de prueba)
# Empresa ficticia. Mismo manifiesto -> mismo genoma (reproducible).
# Sector: agencia de automatización / marketing.
# =====================================================================

company:
  name: "FlujoLab"
  sector: "agencia de automatización y marketing"
  language: es
  domains: ["flujolab.io"]

# Tipos de documento que maneja el negocio (guían la clasificación de INGEST)
document_types:
  - propuesta            # propuesta comercial con precio y alcance
  - transcripcion-call   # transcripción de call con prospecto
  - caso-exito           # case study de cliente entregado
  - lista-objeciones     # objeciones de venta + respuestas
  - precios-cerrados     # tarifas vigentes (caducan rápido)
  - transcripcion-onboarding

# Entidades clave: cada clave es una categoría -> carpeta en wiki/semantic/
entities:
  clientes: ["Dental Sonrisa"]
  leads: ["Inmobiliaria Vértice", "Clínica Estética Lumen"]
  herramientas: ["n8n", "Make", "Twilio", "WhatsApp Cloud API", "OpenAI"]
  productos: ["bot-captacion-leads", "automatizacion-follow-up", "dashboard-reporting"]

# Glosario / siglas internas (el agente las respeta al ingerir y consultar)
glossary:
  MRR: "ingreso recurrente mensual (mensualidad de mantenimiento)"
  setup: "pago único de implementación inicial"
  lead: "prospecto que pidió información y aún no firma"
  cliente: "lead que firmó propuesta y está en mantenimiento"
  SQL: "sales qualified lead, prospecto calificado para venta"
  no-show: "prospecto que agendó call y no asistió"
  follow-up: "seguimiento pendiente a un lead con fecha objetivo"
  SLA: "tiempo de respuesta comprometido del bot"

roles:
  contributors: ["ventas", "ops", "closer"]
  mutation_approver: "fundador"

# Genes específicos del sector que ONBOARD siembra (pasan por la compuerta)
seed_genes:
  - id: gen-precio-perecedero
    trigger: "la fuente contiene un precio cerrado o tarifa (setup/MRR)"
    rule: "Toda página de precios nace con decay_rate: high y un campo valido_hasta (+30 dias del created). Pasado valido_hasta, QUERY la trata como vencida y advierte antes de citarla; nunca se cita un precio sin su fecha de vigencia."
    target_tier: semantic

  - id: gen-lead-a-cliente
    trigger: "un lead existente firma una propuesta y se convierte en cliente"
    rule: "No se borra la página del lead: se conserva en wiki/semantic/leads/ con relation reemplaza_por hacia la nueva pagina de cliente, y la pagina de cliente lleva relation proviene_de hacia el lead. El historial de calls/objeciones del lead se enlaza al cliente."
    target_tier: semantic

  - id: gen-objecion-transversal
    trigger: "la fuente menciona una objecion de venta y su respuesta"
    rule: "Cada objecion va a wiki/semantic/objeciones/ como pagina reutilizable (conocimiento transversal, no atada a un solo lead), enlazada con usa desde las calls donde aparezca. confidence sube cada vez que otra fuente la confirma."
    target_tier: semantic

# Taxonomía inicial de carpetas a crear por tier
taxonomy:
  semantic: [clientes, leads, propuestas, casos-exito, objeciones, precios, herramientas]
  procedural: [sops-ventas, onboarding-cliente]
